<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <!--Header Starts Here-->
    
	<div th:replace="~{fragments/header :: crm-header}"></div>

    <!--Header Ends Here-->

    <!--Main Content Starts Here-->

    <main class="container-fluid" style="height: 625px;">
      <!-- Login section -->
      <section class="container py-5 bg-light">
        <h3 class="text-center mb-4">Login Here</h3>
        <!-- Login form using Bootstrap classes -->
        <div class="row justify-content-center">
          <div class="col-lg-4 col-md-6">
            <div class="card shadow p-5">
              <form action="/loginForm" method="post">
				<div th:if="${errorMsg}" class="mb-3 alert alert-danger">
				    <span th:text="${errorMsg}"></span>
				</div>
				
                <div class="mb-3">
                  <label class="form-label"
                    >Email Id : </label
                  >
                  <input
                    type="email"
                    class="form-control"
                    name="email"
                  />
                  <div id="emailHelp" class="form-text">
                    We'll never share your email with anyone else.
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label"
                    >Password : </label
                  >
                  <input
                    type="password"
                    class="form-control"
                    name ="password"
                  />
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!--Main Content Ends Here-->

    <!--footer Starts Here-->

    <div th:replace="~{fragments/footer :: crm-footer}"></div>
	
    <!--footer Ends Here-->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
