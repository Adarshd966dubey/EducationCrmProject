<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Employee Login Page</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

	<style>
		body {
			background: linear-gradient(135deg, #667eea, #764ba2);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		main {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		section {
			border-radius: 20px;
			background: transparent !important;
		}

		.card {
			border: none;
			border-radius: 20px;
			background: rgba(255, 255, 255, 0.95);
			backdrop-filter: blur(10px);
			transition: all 0.3s ease;
		}

		.card:hover {
			transform: translateY(-5px);
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2) !important;
		}

		h3 {
			color: white;
			font-weight: 700;
			margin-bottom: 25px !important;
			letter-spacing: 1px;
		}

		.form-label {
			font-weight: 600;
			color: #444;
		}

		.form-control {
			border-radius: 10px;
			padding: 10px 15px;
			border: 1px solid #dcdcdc;
			transition: all 0.3s ease;
		}

		.form-control:focus {
			border-color: #667eea;
			box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
		}

		.btn-primary {
			width: 100%;
			border: none;
			border-radius: 10px;
			padding: 10px;
			font-weight: 600;
			background: linear-gradient(135deg, #667eea, #764ba2);
			transition: all 0.3s ease;
		}

		.btn-primary:hover {
			transform: translateY(-2px);
			background: linear-gradient(135deg, #5a6fe0, #6a4199);
		}

		.form-text {
			font-size: 12px;
			color: #777;
		}

		.alert {
			border-radius: 10px;
		}

		@media(max-width:768px) {
			.card {
				padding: 2rem !important;
			}
		}
	</style>
</head>

<body>


	<!--Main Content Starts Here-->

	<main class="container-fluid" style="height: 625px;">
		<!-- Login section -->
		<section class="container py-5 bg-light">
			<h3 class="text-center mb-4">Login Here</h3>
			<!-- Login form using Bootstrap classes -->
			<div class="row justify-content-center">
				<div class="col-lg-4 col-md-6">
					<div class="card shadow p-5">
						<form action="/empLoginForm" method="post">
							<div th:if="${errorMsg}" class="mb-3 alert alert-danger">
								<span th:text="${errorMsg}"></span>
							</div>

							<div class="mb-3">
								<label class="form-label">Email Id : </label>
								<input type="email" class="form-control" name="eemail" />
								<div id="emailHelp" class="form-text">
									We'll never share your email with anyone else.
								</div>
							</div>
							<div class="mb-3">
								<label class="form-label">Password : </label>
								<input type="password" class="form-control" name="epassword" />
							</div>
							<button type="submit" class="btn btn-primary">Login</button>
						</form>
					</div>
				</div>
			</div>
		</section>
	</main>
	<!--Main Content Ends Here-->



	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
