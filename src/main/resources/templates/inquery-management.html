<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Inquery Management Page</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/style.css}" />
	<style>
		.content {
			position: fixed;
		}
	</style>
</head>

<body>
	
	<div th:replace="~{fragments/employee-sidebar ::  frg-employee-sidebar}"></div>
	<div class="content">
		<section class="container py-5">
			<!-- CONTENT AREA -->
			<div class="col-md-10 content-area">
				<section class="container-fluid py-4">
					<!-- Heading -->
					<h2 class="mb-4 fw-bold">
						Inquiry Management
					</h2>
					<!-- Search + Buttons Row -->
					<div class="card shadow-sm p-3 mb-4">
						<div class="row align-items-center">
							<!-- Search Box -->
							<div class="col-md-6">
								<div class="input-group">
									<input type="text" class="form-control" placeholder="Enter phone no.">
									<button class="btn btn-dark">
										<i class="bi bi-search"></i>
									</button>
									<button class="btn btn-primary">
										<i class="bi bi-plus-lg"></i>
									</button>
								</div>
							</div>
							<!-- New Inquiry Button -->
							<div class="col-md-6 text-md-end mt-3 mt-md-0">
								<button class="btn btn-success ms-auto">
									New Inquiry
								</button>
							</div>
						</div>
					</div>
					<!-- Customer Name -->
					<h6 class="mb-3">
						Customer Name :
						<span class="fw-bold">Deepak</span>
					</h6>
					<!-- Table -->
					<div class="table-responsive">
						<table class="table table-bordered">
							<thead class="table-light">
								<tr>
									<th>Interested Course</th>
									<th>Discussion</th>
									<th>Inquiry Type</th>
									<th>Call Type</th>
									<th>Inquiry Date/Time</th>
									<th>Status</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<td>Java Full Stack</td>
									<td>Asked for fees details</td>
									<td>Walk-In</td>
									<td>Incoming</td>
									<td>16-05-2026 10:30 AM</td>
									<td>
										<span class="badge bg-success">
											Interested
										</span>
									</td>
								</tr>
								<tr>
									<td>Python Full Stack</td>
									<td>Requested demo class</td>
									<td>Phone Call</td>
									<td>Outgoing</td>
									<td>16-05-2026 11:15 AM</td>
									<td>
										<span class="badge bg-warning text-dark">
											Follow-Up
										</span>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</section>
			</div>
		</section>
	</div>







	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

</body>

</html>
