<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Bootstrap demo</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

	<link rel="stylesheet" th:href="@{/css/style.css}" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

	<div th:replace="~{fragments/admin-sidebar ::  frg-admin-sidebar}"></div>

	<div class="content">
		<h1>Employee Management</h1>
		<p>Here you can add, update and delete new employee : </p>

		<section class="mt-5">
			<a href="addEmployee" class="btn btn-primary"> Add Employee</a>
		</section>

		<section class="mt-5">


			<div th:if="${successMsg}" class="mb-3 alert alert-success" role="alert">
				<span th:text="${successMsg}"></span>
			</div>

			<div th:if="${errormsg}" class="mb-3 alert alert-danger" role="alert">
				<span th:text="${errormsg}"></span>
			</div>


			<table class="table table-striped table-hover table-bordered shadow">
				<thead>
					<tr>
						<th scope="col">Employee Name</th>
						<th scope="col">Employee Email</th>
						<th scope="col">Employee Phoneno</th>
						<th scope="col">Edit Employee</th>
						<th scope="col">Delete Employee</th>
					</tr>
				</thead>
				<tbody>

					<tr th:each="employee : ${employeePage.content}">

						<td th:text="${employee.ename}"></td>
						<td th:text="${employee.eemail}"></td>
						<td th:text="${employee.ephoneno}"></td>

						<td>
							<a th:href="@{/editEmployee(employeeEmail=${employee.eemail})}" class="btn btn-warning">
								<i class="bi bi-pencil-fill text-white"></i>
							</a>
						</td>
						<td>
							<button class="btn btn-danger" th:data-eemail="${employee.eemail}"
								onclick="deleteEmployee(this.getAttribute('data-eemail'))">
								<i class="bi bi-trash-fill text-white"></i>
							</button>
						</td>
					</tr>

				</tbody>
			</table>


	<!-- ---------- for delete the employee by mail --------------- -->


			<nav aria-label="Page navigation">
				<ul class="pagination">
					<li class="page-item" th:classappend="${employeePage.hasPrevious()} ? '':'disabled'">
						<a class="page-link"
							th:href="@{/employeeManagement(page=${employeePage.number-1}, size=${employeePage.size})}">
							<span aria-hidden="true">&laquo;</span>
						</a>
					</li>
					<li class="page-item" th:each="i : ${#numbers.sequence(0,employeePage.totalPages-1)}"
						th:classappend="${employeePage.number==i} ? 'active':''">
						<a class="page-link" th:href="@{/employeeManagement(page=${i}, size=${employeePage.size})}"
							th:text="${i+1}"></a>
					</li>
					<li class="page-item" th:classappend="${employeePage.hasNext()} ? '':'disabled'">
						<a class="page-link"
							th:href="@{/employeeManagement(page=${employeePage.number+1}, size=${employeePage.size})}">
							<span aria-hidden="true">&raquo;</span>
						</a>
					</li>
				</ul>
			</nav>

		</section>
	</div>

	<!-- -------- Pop message when delete employee  ---------------- -->
	
	<div class="modal" tabindex="-1" id="deleteModal">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">Delete Employee</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<p>Are you sure you want to delete this employee.</p>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
					<button type="button" class="btn btn-primary" id="deleteEmployeeBtn">Delete</button>
				</div>
			</div>
		</div>
	</div>


	
	<!-- -------- for delete the employee by mail logic in Js---------------- -->
	<script>


		var employeeEmailToDelete;
		function deleteEmployee(employeeEmail) {
			var deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
			deleteModal.show();
			employeeEmailToDelete = employeeEmail;
		}
		document.getElementById('deleteEmployeeBtn').addEventListener('click', function () {
			window.location.href = '/deleteEmployeeDetails?employeeEmail=' + encodeURIComponent(employeeEmailToDelete);
		});

	</script>


	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
