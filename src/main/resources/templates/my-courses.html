<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>My Courses Page</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<!-- This is the main page of the website. It contains the header, main content, and footer. -->

<body>
	<!--Header Starts Here-->

	<div th:replace="~{fragments/user-header :: u-header}"></div>

	<!--Header Ends Here-->

	<!--Main Content Starts Here-->

	<main class="container-fluid" style="min-height: 550px">
		<!-- Login section -->
		<section class="container py-5 bg-light">
			<h3 class="text-center mb-4">My Purchased Courses</h3>
			<div class="row g-4">
				
				<div th:each="purchasedCourse : ${purchasedCoursesList}" class="col-lg-3 col-md-6">
					<div class="card" style="width: 18rem">
						<img th:src="@{${purchasedCourse.imageUrl}}" class="card-img-top" alt="Core Java" />
						<div class="card-body">
							<h5 class="card-title">
								<span th:text="${purchasedCourse.courseName}"></span>
							</h5>
							<p class="card-text">
								<span th:text="${purchasedCourse.description}"></span>
							</p>



							<div>
								<button class="btn btn-outline-success">
									Continue Course
								</button>
							</div>
						</div>
						<div class="card-footer text-body-secondary">
							Updated : <span th:text="${purchasedCourse.updatedOn}"></span>
						</div>
						<div class="card-footer text-body-secondary">
							<small>Purchased On : <br/><strong><span th:text="${purchasedCourse.purchasedOn}"></span></strong></small>
						</div>
					</div>
				</div>
			</div>
		</section>

		<!-- First Course card for CoreJava Ends  -->


	</main>
	<!--Main Content Ends Here-->

	<!--footer Starts Here-->

	<div th:replace="~{fragments/footer :: crm-footer }"></div>
	<!--footer Ends Here-->

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
