<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Sell Course</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/style.css}" />
	
</head>

<body>



	<div th:replace="~{fragments/employee-sidebar ::  frg-employee-sidebar}"></div>

	<div class="content">

		<section class="container py-5">

			<h1 class="mb-2">Sell Course</h1>
			<p class="text-muted mb-5">
				Provide proper details to sell course
			</p>

			<div class="row justify-content-center">

				<div class="col-lg-5 col-md-7">

					<h2 class="text-center mb-4">Sell Course</h2>

					<form action="/sellCourse" method="post" th:object="${sellCourse}">

						<div class="card shadow sell-course-card p-4">

							<!-- Success Message -->

							<div th:if="${successMsg}" class="alert alert-success mb-3" role="alert">

								<span th:text="${successMsg}"></span>

							</div>


							<!-- Course Name -->

							<div class="mb-4">

								<label class="form-label">
									Course Name :
								</label>

								<select class="form-select" required>

									<option value="">
										Select Course
									</option>

									<option value="Java Full Stack">
										Java Full Stack
									</option>

									<option value="Python Full Stack">
										Python Full Stack
									</option>

									<option value="MERN Stack">
										MERN Stack
									</option>

									<option value="Data Science">
										Data Science
									</option>

								</select>

							</div>


							<!-- Course Amount -->

							<div class="mb-4">

								<label class="form-label">
									Course Amount :
								</label>

								<input type="text" class="form-control" required />

							</div>


							<!-- User Email -->

							<div class="mb-4">

								<label class="form-label">
									User Email Id :
								</label>

								<input type="email" class="form-control" required />

							</div>


							<!-- Transaction Id -->

							<div class="mb-4">

								<label class="form-label">
									Transaction Id :
								</label>

								<input type="text" class="form-control" required />

							</div>


							<!-- Order Id -->

							<div class="mb-4">

								<label class="form-label">
									Order Id :
								</label>

								<input type="text" class="form-control" required />

							</div>


							<!-- Submit Button -->

							<button type="submit" class="btn btn-primary">

								Sell Course

							</button>

						</div>

					</form>

				</div>

			</div>

		</section>

	</div>







	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

</body>

</html>
