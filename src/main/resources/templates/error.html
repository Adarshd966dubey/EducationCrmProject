<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff4e50, #f9d423);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        .icon {
            font-size: 60px;
            color: red;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            text-decoration: none;
            background: #ff4e50;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e04345;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">❌</div>
        <h1>Facing Issue Please try After some Time.</h1>
        <p th:if="${errorMsg}" class="mb-5">
		  <span th:text="${errorMsg}"> </span>
		</p>
        <a href="/index" class="btn">Try Again</a>
    </div>

</body>
</html>
