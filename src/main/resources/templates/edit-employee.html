<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Edit Employee Page</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
	<link rel="stylesheet" th:href="@{/css/style.css}" />

</head>

<body>

	<div th:replace="~{fragments/admin-sidebar :: frg-admin-sidebar}"></div>

	<div class="content">
		<h1>Employee Management</h1>
		<p>Edit Employee below...</p>

		<section class="mt-5">
			<h3 class="text-center">Edit Employee</h3>
			<div class="row justify-content-center">
				<div class="card shadow mt-5 p-5" style="width: 50%;">
					
					<!-- Update Employee Form here-->
					<form th:action="@{/updateEmployeeDetailsForm}" th:object="${newEmployeeObj}" method="post"
						enctype="multipart/form-data">

						<div class="mb-3">
							<label class="form-label">Employee Name : </label>
							<input type="text" name="ename" th:value="${employee.ename}" class="form-control"
								required />
						</div>

						<div class="mb-3">
							<label class="form-label">Employee Email: </label>
							<input type="text" name="eemail" th:value="${employee.eemail}" class="form-control"
								readonly />
						</div>
						<div class="mb-3">
							<label class="form-label">Employee Password : </label>
							<input type="text" name="epassword" th:value="${employee.epassword}" class="form-control"
								required />
						</div>
						<div class="mb-3">
							<label class="form-label">Employee Phoneno : </label>
							<input type="text" name="ephoneno" th:value="${employee.ephoneno}" class="form-control"
								required />
						</div>
						<div class="mb-3">
							<label class="form-label">Employee City : </label>
							<input type="text" name="ecity" th:value="${employee.ecity}" class="form-control"
								required />
						</div>
						<button type="submit" class="btn btn-primary">Update Employee Details</button>
					</form>
				</div>
			</div>
		</section>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
