<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Admin Login Page</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

	<style>
		html,
		body {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100%;
		}
	</style>
</head>

<body>
	<div class="card shadow" style="width: 500px">
		<div class="card-body text-center">
			<h4 class="card-title py-5">Admin Login</h4>

			<div th:if="${errorMsg}" class="mb-3 alert alert-danger">
				<span th:text="${errorMsg}"></span>
			</div>

			<form action="adminLoginForm" method="POST">
				<div class="mb-3">
					<label for="exampleInputEmail1" class="form-label"></label>
					Admin Email :
					</label>
					<input type="email" class="form-control" name="adminemail" />
				</div>
				<div class="mb-3">
					<label for="exampleInputPassword1" class="form-label">
						Admin Password :
					</label>
					<input type="password" class="form-control" name="adminpass" />
				</div>
				<button type="submit" class="btn btn-primary">Login</button>
			</form>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
